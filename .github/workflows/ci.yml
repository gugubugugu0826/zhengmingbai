name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 前端类型检查
        run: npm run typecheck --workspace=web --if-present

      - name: 前端构建
        run: npm run build --workspace=web --if-present
